<!DOCTYPE html>
<html>
<head>
    <title>Fixing Updates...</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18031616446"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'AW-18031616446');
    </script>
    <!-- Event snippet for Page view conversion page -->
    <script>
      gtag('event', 'conversion', {
          'send_to': 'AW-18031616446/wXYBCPTTlLscEL7DkpZD',
          'value': 1.0,
          'currency': 'INR'
      });
    </script>
</head>
<body style="background: #030305; color: #FFD700; font-family: sans-serif; text-align: center; padding-top: 20vh;">
    <h1>Applying Premium Updates...</h1>
    <p>Please wait a second.</p>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
                // Clear local storage just in case
                localStorage.clear();
                
                // Force a true hard reload to the home page
                setTimeout(() => {
                    window.location.href = '/index.html?cleared=' + Date.now();
                }, 1000);
            });
        } else {
            window.location.href = '/index.html?cleared=' + Date.now();
        }
    </script>
</body>
</html>
